<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafeteria | Login</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/login_signup.css">
    <script src="./js/manage-signup.js" defer></script>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
        }

        .form__logo img {
            display: block;
            margin: 0 auto;
            width: 100px;
        }

        .form__inputs {
            margin-top: 1.5rem;
        }

        .form__inputs--username,
        .form__inputs--password {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
        }

        .form__inputs--username img,
        .form__inputs--password img {
            width: 20px;
            margin-right: 0.5rem;
        }

        .form__inputs--username input,
        .form__inputs--password input {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            padding: 0.5rem;
            font-size: 1rem;
        }

        .form__submission input[type="submit"] {
            width: 100%;
            padding: 0.8rem;
            border: none;
            background: linear-gradient(to right, #ff6a88, #ff99ac);
            color: white;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .form__submission input[type="submit"]:hover {
            background: linear-gradient(to right, #ff99ac, #ff6a88);
        }

        .sign_up--login {
            border: 1px solid #ccc;
            width: fit-content;
            padding: 0.5rem 3rem;
            font-size: 0.95rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 1rem auto 0;
            display: block;
            text-align: center;
            background: linear-gradient(to right, #562813, #94874C);
            color: white;
            transition: background-color 0.3s ease-in-out, box-shadow 0.3s;
        }

        .sign_up--login:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background-image: linear-gradient(to right, #94874C, #562813);
        }

        .OR {
            text-align: center;
            margin: 1rem 0;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container--Overlay"></div>
    <div class="container">
        <fieldset class="sub-container">
            <form action="./php/manage_signup.php" method="post">
                <div class="form__logo">
                    <img src="./assets/imgs/logo.png" alt="Cafe Management System">
                </div>
                <div class="form__inputs">
                    <div class="form__inputs--username">
                        <img src="./assets/icons/user-solid.svg" alt="User">
                        <input type="text" placeholder="Enter your name" name="name" id="name" autocomplete="off">
                    </div>
                    <div class="form__inputs--username">
                        <img src="./assets/icons/user-solid.svg" alt="User">
                        <input type="text" placeholder="Enter your username" name="username" id="username" autocomplete="off">
                    </div>
                    <div class="form__inputs--password">
                        <img src="./assets/icons/lock-solid.svg" alt="Password">
                        <input type="password" placeholder="Enter your password" name="password" id="password">
                    </div>
                </div>
                <div class="form__submission">
                    <input type="submit" value="Sign Up" name="submit" id="submitButton" disabled>
                </div>
            </form>
            <p class="OR">OR</p>
            <div class="form__submission">
                <a href="./login.php" class="sign_up--login">Login</a>
            </div>
        </fieldset>
    </div>
</body>
</html>
