<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="index.css">
    <title>Document</title>
    <link rel="stylesheet" href="../../css/reset.css">
    <style>
      body{
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      input{
        outline: none;
      }
      .header{
        background-color: black;
        padding: 3rem 4rem 2rem 4rem;
        color: white;
        text-align: center;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header--heading{
        font-size: 1.5rem;
        font-weight: bold;
        cursor: pointer;
      }
      .header--logout{
        background-color: white;
        color: black;
        padding: 1rem 3rem;
        font-weight: bold;
        border-radius: 0.5rem;
        border: 1px solid white;
        transition: all 0.3s ease-in-out;
      }
      .header--logout:hover{
        background-color: black;
        color: white;
        transition: all 0.3s ease-in-out;
      }
      main{
        min-height: calc(100vh - 5rem);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container{
        max-width: 800px;
        background: #fff;
        width: 800px;
        padding: 4rem;
        box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
      }
      .container .text{
        text-align: center;
        font-size: 41px;
        font-weight: 600;
        font-family: 'Poppins', sans-serif;
      
      }
      .container--message{
        font-size: 1.4rem;
        margin-top: 1rem;
      }
      .container form{
        padding: 30px 0 0 0;
      }
      .container form .form-row{
        display: flex;
        margin: 32px 0;
      }
      form .form-row .input-data{
        width: 100%;
        height: 40px;
        margin: 0 20px;
        position: relative;
      }
      form .form-row .textarea{
        height: 70px;
      }
      .input-data input,
      .textarea textarea{
        display: block;
        width: 100%;
        height: 100%;
        border: none;
        font-size: 17px;
        border-bottom: 2px solid rgba(0,0,0, 0.12);
      }
      .input-data input:focus ~ label, .textarea textarea:focus ~ label,
      .input-data input:valid ~ label, .textarea textarea:valid ~ label{
        transform: translateY(-20px);
        font-size: 14px;
        color: #3498db;
      }
      .textarea textarea{
        resize: none;
        padding-top: 10px;
      }
      .input-data label{
        position: absolute;
        pointer-events: none;
        bottom: 10px;
        font-size: 16px;
        transition: all 0.3s ease;
      }
      .textarea label{
        width: 100%;
        bottom: 40px;
        background: #fff;
      }
      .input-data .underline{
        position: absolute;
        bottom: 0;
        height: 2px;
        width: 100%;
      }
      .input-data .underline:before{
        position: absolute;
        content: "";
        height: 2px;
        width: 100%;
        background: #3498db;
        
      }

      .submit-btn .input-data{
        overflow: hidden;
        height: 45px!important;
        width: 25%!important;
      }
      .submit-btn .input-data .inner{
        height: 100%;
        width: 300%;
        position: absolute;
        left: -100%;
        background:  #95528c;
        transition: all 0.4s;
      }
      .submit-btn .input-data:hover .inner{
        left: 0;
      }
      .submit-btn .input-data input{
        background: none;
        border: none;
        color: #fff;
        font-size: 17px;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1px;
        cursor: pointer;
        position: relative;
        z-index: 2;
      }
      @media (max-width: 700px) {
        .container .text{
          font-size: 30px;
        }
        .container form{
          padding: 10px 0 0 0;
        }
        .container form .form-row{
          display: block;
        }
        form .form-row .input-data{
          margin: 35px 0!important;
        }
        .submit-btn .input-data{
          width: 40%!important;
        }
      }
    </style>
</head>
<body>
    <header class="header">
      <h2 class="header--heading"><a href="./manager_view.html">Manager</a></h2>
      <a href="../../logout.php" class="header--logout">Logout</a>
    </header>
    <main>
      <div class="container">
        <div class="text">
          Update a Food Item
          <p class="container--message">Leave the fields you don't want to update.</p>
        </div>
        <form action="update_fooditem.php" method="post">
           <div class="form-row">
              <div class="input-data">
                 <input type="number" name="fid" required>
                 <div class="underline"></div>
                 <label for="">ID</label>
              </div>
              <div class="input-data">
                 <input type="text" name="name">
                 <div class="underline"></div>
                 <label for="">Name</label>
              </div>
           </div>
           <div class="form-row">
              <div class="input-data">
                 <input type="text" name="category">
                 <div class="underline"></div>
                 <label for="">Category</label>
              </div>
              <div class="input-data">
                 <input type="number" name="price">
                 <div class="underline"></div>
                 <label for="">Unit Price</label>
              </div>
              <div class="input-data">
                <input type="url" name="image">
                <div class="underline"></div>
                <label for="">Image URL</label>
             </div>
           </div>
           <div class="form-row">
           <div class="input-data textarea">
              <div class="form-row submit-btn">
                 <div class="input-data">
                    <div class="inner"></div>
                    <input type="submit" value="submit">
                 </div>
              </div>
        </form>
        </div>
    </main>
</body>
</html>
